<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Drone body -->
  <ellipse cx="50" cy="50" rx="20" ry="12" fill="url(#grad)"/>
  <!-- Propeller arms -->
  <line x1="30" y1="50" x2="20" y2="30" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="50" x2="80" y2="30" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="20" y2="70" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="50" x2="80" y2="70" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <!-- Propellers -->
  <circle cx="20" cy="30" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="80" cy="30" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="20" cy="70" r="6" fill="#60a5fa" opacity="0.8"/>
  <circle cx="80" cy="70" r="6" fill="#60a5fa" opacity="0.8"/>
  <!-- Camera/gimbal -->
  <circle cx="50" cy="58" r="4" fill="#1e40af"/>
</svg>
